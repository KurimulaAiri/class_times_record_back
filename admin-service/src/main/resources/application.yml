server:
  port: 10003

spring:
  application:
    name: admin-service
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: ${nacos-server-addr:localhost:8848}
        namespace: ${nacos-namespace:}
        group: DEFAULT_GROUP
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${database-address}:3306/class_times_record?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: class_times_record
    password: 8BCnbZjTT8ZxmBj6
  threads:
    virtual:
      enabled: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
  mapper-locations: classpath:com/shiroko/mapper/**/*.xml
  type-aliases-package: com.shiroko.repository.entity
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: isDeleted
      logic-not-delete-value: 0
      logic-delete-value: 1
      insert-strategy: NOT_NULL
      update-strategy: NOT_NULL

jwt:
  secret: class-times-record-secret-key-2024
  expiration: 86400000
