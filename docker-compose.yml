services:
  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: nacos
    environment:
      MODE: standalone
      JVM_XMS: 256m
      JVM_XMX: 256m
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-data:/home/nacos/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8848/nacos/"]
      interval: 10s
      timeout: 5s
      retries: 30

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
    depends_on:
      nacos:
        condition: service_healthy
      auth-service:
        condition: service_started
      business-service:
        condition: service_started
    restart: always

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      DATABASE_ADDRESS: ${DB_HOST:-172.17.0.1}
    depends_on:
      nacos:
        condition: service_healthy
    restart: always

  business-service:
    build:
      context: ./business-service
      dockerfile: Dockerfile
    container_name: business-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      DATABASE_ADDRESS: ${DB_HOST:-172.17.0.1}
    depends_on:
      nacos:
        condition: service_healthy
    restart: always

volumes:
  nacos-data:
