services:
  # ==================== 微服务容器（gateway 作为 JAR 直跑，不走容器） ====================
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    image: cr-auth-service:latest
    container_name: cr-auth-service
    restart: unless-stopped
    environment:
      NACOS_SERVER_ADDR: nacos.kurimula-airi.top
      NACOS_NAMESPACE: course-record
      SENTINEL_ADDR: sentinel.kurimula-airi.top
      SENTINEL_CLIENT_IP: 172.16.36.126
      # Tomcat 线程池限制（减少线程栈内存占用）
      SERVER_TOMCAT_THREADS_MAX: "50"
      SERVER_TOMCAT_THREADS_MIN_SPARE: "5"
      # HikariCP 连接池限制（减少数据库连接内存占用）
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "10"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "2"
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M
    network_mode: host

  business-service:
    build:
      context: .
      dockerfile: business-service/Dockerfile
    image: cr-business-service:latest
    container_name: cr-business-service
    restart: unless-stopped
    environment:
      NACOS_SERVER_ADDR: nacos.kurimula-airi.top
      NACOS_NAMESPACE: course-record
      SENTINEL_ADDR: sentinel.kurimula-airi.top
      SENTINEL_CLIENT_IP: 172.16.36.126
      SERVER_TOMCAT_THREADS_MAX: "50"
      SERVER_TOMCAT_THREADS_MIN_SPARE: "5"
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "10"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "2"
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M
    network_mode: host

  admin-service:
    build:
      context: .
      dockerfile: admin-service/Dockerfile
    image: cr-admin-service:latest
    container_name: cr-admin-service
    restart: unless-stopped
    environment:
      NACOS_SERVER_ADDR: nacos.kurimula-airi.top
      NACOS_NAMESPACE: course-record
      SENTINEL_ADDR: sentinel.kurimula-airi.top
      SENTINEL_CLIENT_IP: 172.16.36.126
      SERVER_TOMCAT_THREADS_MAX: "50"
      SERVER_TOMCAT_THREADS_MIN_SPARE: "5"
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "10"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "2"
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M
    network_mode: host