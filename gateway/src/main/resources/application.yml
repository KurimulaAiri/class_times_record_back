server:
  port: 9999

spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${nacos-server-addr:localhost:8848}
        namespace: ${nacos-namespace:}
        group: DEFAULT_GROUP
    sentinel:
      transport:
        dashboard: ${sentinel-dashboard:localhost:8080}
      eager: true
      filter:
        enabled: true
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # Auth service — /auth/** 转发到 auth-service，去掉 /auth 前缀
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
        # Business service — /biz/** 转发到 business-service，去掉 /biz 前缀
        - id: business-service
          uri: lb://business-service
          predicates:
            - Path=/biz/**
          filters:
            - StripPrefix=1
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

jwt:
  secret: class-times-record-secret-key-2024
  expiration: 86400000

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.alibaba.cloud.nacos: INFO
    com.alibaba.csp.sentinel: INFO
