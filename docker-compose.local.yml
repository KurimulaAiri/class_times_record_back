# ============================================================
# 本地开发版 Docker Compose
# 仅包含 Nginx + 4 个微服务，其余依赖远程服务：
#   MySQL:         121.196.229.10:3306
#   Nacos:         nacos.kurimula-airi.top/api/nacos
#   Sentinel:      sentinel.kurimula-airi.top
#
# 使用方式：
#   docker compose -f docker-compose.local.yml up -d --build
#
# 访问地址：
#   Nginx (统一入口):  http://localhost:9080
#   Gateway (直连):    http://localhost:9999
# ============================================================

services:
  # ==================== Nginx 反向代理 ====================
  nginx:
    image: nginx:1.27
    container_name: cr-nginx
    restart: unless-stopped
    ports:
      - "9080:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ==================== 微服务 ====================
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    image: cr-gateway:latest
    container_name: cr-gateway
    restart: unless-stopped
    ports:
      - "9999:9999"
    environment:
      NACOS_SERVER_ADDR: ${NACOS_ADDR:-nacos.kurimula-airi.top}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-course-record}
      SENTINEL_DASHBOARD: ${SENTINEL_ADDR:-sentinel.kurimula-airi.top}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9999/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - app-network

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    image: cr-auth-service:latest
    container_name: cr-auth-service
    restart: unless-stopped
    ports:
      - "10002:10002"
    environment:
      NACOS_SERVER_ADDR: ${NACOS_ADDR:-nacos.kurimula-airi.top}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-course-record}
      DATABASE_ADDRESS: ${DB_ADDR:-121.196.229.10}
      SENTINEL_DASHBOARD: ${SENTINEL_ADDR:-sentinel.kurimula-airi.top}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:10002/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - app-network

  business-service:
    build:
      context: .
      dockerfile: business-service/Dockerfile
    image: cr-business-service:latest
    container_name: cr-business-service
    restart: unless-stopped
    ports:
      - "10001:10001"
    environment:
      NACOS_SERVER_ADDR: ${NACOS_ADDR:-nacos.kurimula-airi.top}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-course-record}
      DATABASE_ADDRESS: ${DB_ADDR:-121.196.229.10}
      SENTINEL_DASHBOARD: ${SENTINEL_ADDR:-sentinel.kurimula-airi.top}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:10001/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - app-network

  admin-service:
    build:
      context: .
      dockerfile: admin-service/Dockerfile
    image: cr-admin-service:latest
    container_name: cr-admin-service
    restart: unless-stopped
    ports:
      - "10003:10003"
    environment:
      NACOS_SERVER_ADDR: ${NACOS_ADDR:-nacos.kurimula-airi.top}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-course-record}
      DATABASE_ADDRESS: ${DB_ADDR:-121.196.229.10}
      SENTINEL_DASHBOARD: ${SENTINEL_ADDR:-sentinel.kurimula-airi.top}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:10003/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
