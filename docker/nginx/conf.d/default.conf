# ==================== 微服务统一入口 ====================
# Nginx 作为反向代理，所有请求统一转发到 Gateway
#
# 访问方式（宿主机端口 9080）：
#   http://localhost:9080/auth/...      → Gateway → Auth Service
#   http://localhost:9080/biz/...       → Gateway → Business Service
#   http://localhost:9080/actuator/...  → Gateway → Actuator

# 使用 Docker 内置 DNS 解析器，实现运行时动态解析 upstream 主机名
# 避免启动时 gateway 尚未注册 DNS 导致 nginx 启动失败
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen       80;
    server_name  localhost;

    # 请求体最大 50M（文件上传等场景）
    client_max_body_size 50m;

    # ==================== 日志 ====================
    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log   warn;

    # ==================== 健康检查 ====================
    location /nginx-health {
        access_log off;
        return 200 "nginx ok\n";
        add_header Content-Type text/plain;
    }

    # ==================== 核心 API 转发 ====================
    location / {
        # 使用变量方式代理，配合 resolver 实现运行时 DNS 解析
        # nginx 不会在启动时校验此地址是否可达，而是在每次请求时动态解析
        set $gateway_upstream http://gateway:9999;
        proxy_pass  $gateway_upstream;

        # 标准代理头
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# ==================== WebSocket 升级变量 ====================
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
